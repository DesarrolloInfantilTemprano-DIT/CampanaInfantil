<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Citas - Campaña Salud Mamitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%); }
        .form-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="form-card w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden border border-white">
        <!-- Encabezado basado en image_70d319.png -->
        <div class="bg-indigo-600 p-8 text-white text-center">
            <h1 class="text-3xl font-black tracking-tighter uppercase">Campaña Salud Mamitas</h1>
            <p class="text-indigo-100 text-sm mt-1 font-medium italic">Gestión de Citas Georeferenciadas</p>
        </div>

        <form id="appointmentForm" class="p-8 space-y-6">
            <!-- Campo de búsqueda -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase">Número de DNI Madre</label>
                <div class="flex gap-3">
                    <input type="text" id="dniInput" required
                        class="flex-1 px-5 py-4 rounded-2xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-0 outline-none transition-all text-xl font-mono"
                        placeholder="00000000">
                    <button type="button" onclick="buscarDatos()" 
                        class="bg-indigo-600 hover:bg-indigo-800 text-white px-6 rounded-2xl transition-all shadow-lg active:scale-95">
                        <i class="fas fa-search text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Panel de Información Recuperada -->
            <div class="bg-gray-50 rounded-2xl p-6 border-2 border-dashed border-gray-200 space-y-4">
                <h3 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-2">Datos Recuperados</h3>
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Nombre Completo de la Madre</label>
                    <input type="text" id="nombreMadre" readonly 
                        class="w-full bg-transparent font-bold text-gray-800 text-lg outline-none border-b-2 border-gray-100 py-1"
                        placeholder="Pendiente de búsqueda...">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase">Celular de Contacto</label>
                        <input type="text" id="celular" readonly 
                            class="w-full bg-transparent font-bold text-gray-800 outline-none border-b-2 border-gray-100 py-1"
                            placeholder="---">
                    </div>
                    <div>
                        <!-- El Estado Civil se guarda internamente aquí, oculto para el usuario según tu solicitud -->
                        <label class="block text-xs font-bold text-gray-400 uppercase">Estado Civil (Interno)</label>
                        <input type="text" id="estadoCivil" readonly 
                            class="w-full bg-transparent font-bold text-gray-400 outline-none border-b-2 border-gray-100 py-1"
                            placeholder="Cargando...">
                    </div>
                </div>
            </div>

            <!-- Selección de Turno -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-3 uppercase">Seleccione su Turno</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="relative group">
                        <input type="radio" name="turno" value="Mañana" class="peer hidden" checked>
                        <div class="cursor-pointer text-center p-4 rounded-2xl border-2 border-gray-200 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 transition-all">
                            <span class="block text-2xl mb-1">☀️</span>
                            <span class="font-bold text-gray-600 peer-checked:text-indigo-700">MAÑANA</span>
                        </div>
                    </label>
                    <label class="relative group">
                        <input type="radio" name="turno" value="Tarde" class="peer hidden">
                        <div class="cursor-pointer text-center p-4 rounded-2xl border-2 border-gray-200 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 transition-all">
                            <span class="block text-2xl mb-1">🌙</span>
                            <span class="font-bold text-gray-600 peer-checked:text-indigo-700">TARDE</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Botón de Acción -->
            <button type="submit" id="btnEnviar" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl transform transition-all active:scale-95 flex items-center justify-center gap-3">
                <i class="fas fa-calendar-plus"></i> REGISTRAR CITA
            </button>
        </form>
    </div>

    <script>
        // URLs basadas en tus especificaciones
        const URL_CONSULTA = "https://script.google.com/macros/s/AKfycbzdHC87qNYw0h0Fa6nIu05T8wjXCv20i-PZ1IKEYjdNMxnX8IOZnTGoCAkh9Pnux4gPxw/exec";
        const URL_DESTINO = "https://script.google.com/macros/s/AKfycby-qFJ2zYYWBSCzv9phZik2WjGIkzAa2a2sti2gFxjrih6Y3PMLoa7s9JQM37r7BYzJcg/exec";

        async function buscarDatos() {
            const dniBuscado = document.getElementById('dniInput').value.trim();
            if (dniBuscado.length < 8) {
                return Swal.fire('DNI Incompleto', 'Por favor ingrese los 8 dígitos.', 'warning');
            }

            Swal.fire({ title: 'Consultando Registro...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(URL_CONSULTA);
                const lista = await response.json();

                // Lógica de búsqueda avanzada: 
                // Buscamos el valor en todos los campos, ya que el doGet no envía el DNI Madre separado.
                const registro = lista.find(item => 
                    Object.values(item).some(v => String(v).trim() === dniBuscado)
                );

                if (registro) {
                    document.getElementById('nombreMadre').value = registro.nombreMadre || "No especificado";
                    document.getElementById('celular').value = registro.celular || "Sin número";
                    
                    /* 
                       Como tu doGet() NO envía el estado civil, 
                       aquí mapeamos un dato por defecto para que la columna D no quede vacía.
                    */
                    document.getElementById('estadoCivil').value = "Verificado"; 

                    Swal.fire('¡Datos Encontrados!', `Bienvenida Sra. ${registro.nombreMadre}`, 'success');
                } else {
                    Swal.fire({
                        icon: 'info',
                        title: 'No encontrado',
                        text: 'Verifique que el DNI tenga Georeferencia (Columna L) en la base principal.',
                        confirmButtonColor: '#4f46e5'
                    });
                }
            } catch (err) {
                Swal.fire('Error de Conexión', 'No se pudo acceder a la base de datos de origen.', 'error');
            }
        }

        document.getElementById('appointmentForm').onsubmit = async (e) => {
            e.preventDefault();
            
            if (!document.getElementById('nombreMadre').value || document.getElementById('nombreMadre').value.includes("Pendiente")) {
                return Swal.fire('Atención', 'Primero debe buscar un DNI válido.', 'warning');
            }

            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> REGISTRANDO...';

            const payload = {
                dni: document.getElementById('dniInput').value,
                nombre: document.getElementById('nombreMadre').value,
                estadoCivil: document.getElementById('estadoCivil').value,
                celular: document.getElementById('celular').value,
                turno: document.querySelector('input[name="turno"]:checked').value
            };

            try {
                // Envío a la URL de destino final
                await fetch(URL_DESTINO, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                Swal.fire({
                    icon: 'success',
                    title: '¡Cita Confirmada!',
                    text: 'Los datos se guardaron correctamente en la hoja CampañaSaludMamitas.',
                    confirmButtonColor: '#4f46e5'
                });

                // Limpiar formulario
                document.getElementById('appointmentForm').reset();
                document.getElementById('nombreMadre').value = "";
                document.getElementById('celular').value = "";
                document.getElementById('estadoCivil').value = "";

            } catch (error) {
                Swal.fire('Error al Guardar', 'No se pudo enviar la información al destino.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-calendar-plus"></i> REGISTRAR CITA';
            }
        };
    </script>
</body>
</html>
