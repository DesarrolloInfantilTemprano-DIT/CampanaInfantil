<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaña Salud Mamitas - Formulario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-3xl card-shadow overflow-hidden">
        <div class="bg-indigo-700 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase tracking-tight">Campaña Salud Mamitas</h1>
            <p class="text-indigo-100 text-sm italic">Validación de Georeferencia</p>
        </div>

        <form id="appointmentForm" class="p-8 space-y-5">
            <!-- Buscador -->
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">DNI a Consultar</label>
                <div class="flex gap-2">
                    <input type="text" id="dniInput" required
                        class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-indigo-500 outline-none transition-all text-lg font-bold"
                        placeholder="Ingrese DNI">
                    <button type="button" onclick="buscarUniversal()" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 rounded-xl transition-all">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>

            <!-- Datos Recuperados -->
            <div class="bg-slate-50 rounded-2xl p-5 space-y-4 border border-slate-100">
                <div>
                    <label class="block text-[10px] font-bold text-indigo-400 uppercase">Nombre de la Madre</label>
                    <input type="text" id="nombre_madre" readonly 
                        class="w-full bg-transparent font-bold text-gray-800 outline-none py-1 border-b border-indigo-100">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-indigo-400 uppercase">Celular</label>
                        <input type="text" id="celular" readonly 
                            class="w-full bg-transparent font-bold text-gray-800 outline-none py-1 border-b border-indigo-100">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-indigo-400 uppercase">Domicilio</label>
                        <input type="text" id="domicilio" readonly 
                            class="w-full bg-transparent font-bold text-gray-800 outline-none py-1 border-b border-indigo-100">
                    </div>
                </div>
                
                <!-- Campos ocultos necesarios para el doPost -->
                <input type="hidden" id="dni_madre">
                <input type="hidden" id="estado_civil" value="No Registrado">
            </div>

            <!-- Selección de Turno -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase">Seleccione Turno</label>
                <select id="turno" class="w-full p-3 rounded-xl border-2 border-gray-100 font-bold text-gray-700 bg-white focus:border-indigo-600 outline-none">
                    <option value="Mañana">☀️ Mañana</option>
                    <option value="Tarde">🌙 Tarde</option>
                </select>
            </div>

            <button type="submit" id="btnEnviar" 
                class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-black text-lg shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fas fa-calendar-check"></i> AGENDAR CITA
            </button>
        </form>
    </div>

    <script>
        const URL_CONSULTA = "https://script.google.com/macros/s/AKfycbzdHC87qNYw0h0Fa6nIu05T8wjXCv20i-PZ1IKEYjdNMxnX8IOZnTGoCAkh9Pnux4gPxw/exec";
        const URL_DESTINO = "https://script.google.com/macros/s/AKfycby-qFJ2zYYWBSCzv9phZik2WjGIkzAa2a2sti2gFxjrih6Y3PMLoa7s9JQM37r7BYzJcg/exec";

        async function buscarUniversal() {
            const query = document.getElementById('dniInput').value.trim();
            if (!query) return;

            Swal.fire({ title: 'Buscando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(URL_CONSULTA);
                const lista = await res.json();

                // Buscamos en todas las propiedades que devuelve el doGet (nombreMadre, dniHijo, celular, domicilio)
                const registro = lista.find(item => 
                    Object.values(item).some(v => String(v).trim() === query)
                );

                if (registro) {
                    document.getElementById('nombre_madre').value = registro.nombreMadre || "";
                    document.getElementById('celular').value = registro.celular || "";
                    document.getElementById('domicilio').value = registro.domicilio || "";
                    document.getElementById('dni_madre').value = query; // Usamos el DNI buscado
                    Swal.fire('¡Éxito!', 'Datos recuperados', 'success');
                } else {
                    Swal.fire('No encontrado', 'El DNI no tiene georeferencia registrada.', 'info');
                }
            } catch (e) {
                Swal.fire('Error', 'Error al consultar la base de datos', 'error');
            }
        }

        document.getElementById('appointmentForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerHTML = 'PROCESANDO...';

            const payload = {
                dni_madre: document.getElementById('dni_madre').value,
                nombre_madre: document.getElementById('nombre_madre').value,
                estado_civil: document.getElementById('estado_civil').value,
                celular: document.getElementById('celular').value,
                domicilio: document.getElementById('domicilio').value,
                turno: document.getElementById('turno').value
            };

            try {
                await fetch(URL_DESTINO, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                Swal.fire('¡Registrado!', 'Cita agendada correctamente', 'success');
                document.getElementById('appointmentForm').reset();
            } catch (err) {
                Swal.fire('Error', 'No se pudo guardar.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-calendar-check"></i> AGENDAR CITA';
            }
        };
    </script>
</body>
</html>
