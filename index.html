<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaña Salud Mamitas | Registro Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100-vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
            border-color: #4f46e5;
        }

        .step-badge {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-10">

    <div class="glass-card w-full max-w-2xl rounded-[2.5rem] overflow-hidden">
        <!-- Header -->
        <div class="relative bg-indigo-700 p-10 text-white overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-2">
                    <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase">Módulo de Citas</span>
                </div>
                <h1 class="text-4xl font-extrabold tracking-tight">Campaña Salud <span class="text-indigo-300">Mamitas</span></h1>
                <p class="text-indigo-100 mt-2 opacity-80">Validación instantánea de georeferencia y turnos.</p>
            </div>
            <!-- Decoración abstracta -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </div>

        <form id="appointmentForm" class="p-10 space-y-8">
            
            <!-- SECCIÓN 1: BÚSQUEDA -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-4">
                    <div class="step-badge w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs font-bold">1</div>
                    <h2 class="font-bold text-gray-800 uppercase tracking-wide">Identificación</h2>
                </div>
                
                <div class="relative group">
                    <label class="text-xs font-black text-indigo-500 uppercase mb-2 block ml-1">Documento DNI Madre</label>
                    <div class="flex gap-3">
                        <div class="relative flex-1">
                            <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors"></i>
                            <input type="text" id="dniInput" required maxlength="8"
                                class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-gray-100 bg-gray-50/50 outline-none input-focus transition-all text-xl font-bold text-gray-700"
                                placeholder="00000000">
                        </div>
                        <button type="button" onclick="buscarDatosProfesional()" 
                            class="bg-indigo-600 hover:bg-indigo-700 text-white w-20 rounded-2xl transition-all shadow-lg flex items-center justify-center hover:scale-105 active:scale-95">
                            <i class="fas fa-search text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 2: RESULTADOS (Se muestra con animación) -->
            <div id="resultPanel" class="hidden animate-fade-in space-y-6">
                <div class="flex items-center gap-2 mb-4">
                    <div class="step-badge w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs font-bold">2</div>
                    <h2 class="font-bold text-gray-800 uppercase tracking-wide">Datos del Paciente</h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full bg-white border border-gray-100 p-5 rounded-3xl shadow-sm">
                        <span class="text-[10px] font-black text-gray-400 uppercase block mb-1">Nombre Completo</span>
                        <input type="text" id="nombre_madre" readonly class="w-full text-lg font-bold text-gray-800 outline-none bg-transparent">
                    </div>
                    
                    <div class="bg-white border border-gray-100 p-5 rounded-3xl shadow-sm flex items-center gap-4">
                        <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center text-green-600">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-gray-400 uppercase block">Celular</span>
                            <input type="text" id="celular" readonly class="w-full font-bold text-gray-800 outline-none bg-transparent">
                        </div>
                    </div>

                    <div class="bg-white border border-gray-100 p-5 rounded-3xl shadow-sm flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-gray-400 uppercase block">Domicilio</span>
                            <input type="text" id="domicilio" readonly class="w-full font-bold text-gray-800 outline-none bg-transparent text-sm">
                        </div>
                    </div>
                </div>

                <!-- Campos Internos -->
                <input type="hidden" id="dni_madre_final">
                <input type="hidden" id="estado_civil" value="Georeferenciado">

                <!-- SECCIÓN 3: TURNO -->
                <div class="pt-4">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="step-badge w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs font-bold">3</div>
                        <h2 class="font-bold text-gray-800 uppercase tracking-wide">Asignación de Turno</h2>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative cursor-pointer group">
                            <input type="radio" name="turno" value="Mañana" class="peer hidden" checked>
                            <div class="p-5 rounded-3xl border-2 border-gray-100 bg-gray-50 text-center peer-checked:border-indigo-600 peer-checked:bg-indigo-50 transition-all group-hover:border-gray-200">
                                <span class="block text-3xl mb-1">☀️</span>
                                <span class="block font-bold text-gray-700 peer-checked:text-indigo-700">Mañana</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer group">
                            <input type="radio" name="turno" value="Tarde" class="peer hidden">
                            <div class="p-5 rounded-3xl border-2 border-gray-100 bg-gray-50 text-center peer-checked:border-indigo-600 peer-checked:bg-indigo-50 transition-all group-hover:border-gray-200">
                                <span class="block text-3xl mb-1">🌙</span>
                                <span class="block font-bold text-gray-700 peer-checked:text-indigo-700">Tarde</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Botón Final -->
                <button type="submit" id="btnEnviar" 
                    class="w-full bg-indigo-600 hover:bg-indigo-800 text-white py-5 rounded-[2rem] font-black text-xl shadow-2xl shadow-indigo-200 transition-all transform active:scale-95 flex items-center justify-center gap-3">
                    <i class="fas fa-calendar-check"></i> CONFIRMAR REGISTRO
                </button>
            </div>

            <!-- Loader de inicio -->
            <div id="initialHelp" class="text-center py-10 text-gray-400">
                <i class="fas fa-fingerprint text-5xl mb-4 opacity-20"></i>
                <p class="text-sm font-medium">Ingrese un DNI para comenzar la validación.</p>
            </div>

        </form>
    </div>

    <script>
        const URL_CONSULTA = "https://script.google.com/macros/s/AKfycbyVD5n1k-FOeuEnfXXmqsiuPB1ud1L8rhcEyxSyQs_a0Sqdtn-quxPP_2MEwO4_UIGaKQ/exec";
        const URL_DESTINO = "https://script.google.com/macros/s/AKfycbxpTFXiPn7wcrxsGLiQzYZmFuswTohkNLy_4zzfZotN9Pqn3bU1quVeJD8h2NOOfRWp7g/exec";

        async function buscarDatosProfesional() {
            const dni = document.getElementById('dniInput').value.trim();
            if (dni.length < 8) return Swal.fire('DNI Requerido', 'Debe ingresar los 8 dígitos.', 'info');

            Swal.fire({
                title: 'Buscando Georeferencia',
                html: 'Accediendo a la base de datos central...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const response = await fetch(URL_CONSULTA);
                const data = await response.json();

                // BUSQUEDA POR EL NUEVO CAMPO dniMadre QUE AGREGAMOS AL SCRIPT
                const registro = data.find(item => 
                    String(item.dniMadre).trim() === dni || 
                    String(item.dniHijo).trim() === dni
                );

                if (registro) {
                    // Llenar campos
                    document.getElementById('nombre_madre').value = registro.nombreMadre || "No registrado";
                    document.getElementById('celular').value = registro.celular || "Sin celular";
                    document.getElementById('domicilio').value = registro.domicilio || "Sin dirección";
                    document.getElementById('dni_madre_final').value = dni;

                    // Interfaz
                    document.getElementById('resultPanel').classList.remove('hidden');
                    document.getElementById('initialHelp').classList.add('hidden');
                    
                    Swal.close();
                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Sin Georeferencia',
                        text: 'El DNI ingresado no tiene coordenadas registradas en la base principal (Columna L).',
                        confirmButtonColor: '#4f46e5'
                    });
                }
            } catch (error) {
                Swal.fire('Error de Red', 'No se pudo conectar con el servidor de Google.', 'error');
            }
        }

        document.getElementById('appointmentForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> REGISTRANDO...';

            const payload = {
                dni_madre: document.getElementById('dni_madre_final').value,
                nombre_madre: document.getElementById('nombre_madre').value,
                estado_civil: document.getElementById('estado_civil').value,
                celular: document.getElementById('celular').value,
                domicilio: document.getElementById('domicilio').value,
                turno: document.querySelector('input[name="turno"]:checked').value
            };

            try {
                await fetch(URL_DESTINO, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                Swal.fire({
                    icon: 'success',
                    title: '¡Cita Agendada!',
                    text: 'Se ha registrado correctamente en CampañaSaludMamitas.',
                    confirmButtonColor: '#059669'
                });

                // Reset
                document.getElementById('appointmentForm').reset();
                document.getElementById('resultPanel').classList.add('hidden');
                document.getElementById('initialHelp').classList.remove('hidden');

            } catch (err) {
                Swal.fire('Error', 'No se pudo completar el registro.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-calendar-check"></i> CONFIRMAR REGISTRO';
            }
        };
    </script>
</body>
</html>
