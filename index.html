<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reserva de Citas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-indigo-700 p-6 text-white text-center">
            <i class="fas fa-calendar-check text-4xl mb-2"></i>
            <h1 class="text-2xl font-bold tracking-tight">RESERVA DE CITAS</h1>
            <p class="text-indigo-100 text-sm opacity-80">Complete los datos para su atención</p>
        </div>

        <form id="appointmentForm" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Documento de Identidad (DNI)</label>
                <div class="flex gap-2">
                    <input type="text" id="dni" name="dni" required
                        class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-lg"
                        placeholder="Ingrese DNI">
                    <button type="button" onclick="consultarDNI()" 
                        class="bg-indigo-600 hover:bg-indigo-800 text-white px-5 rounded-xl transition-colors shadow-lg">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4 bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                <div>
                    <label class="block text-xs font-black text-indigo-400 uppercase">Nombre Completo</label>
                    <input type="text" id="nombre" readonly 
                        class="w-full bg-transparent font-semibold text-gray-800 outline-none py-1 border-b border-indigo-200" 
                        placeholder="Esperando consulta...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black text-indigo-400 uppercase">Estado Civil</label>
                        <input type="text" id="estadoCivil" readonly 
                            class="w-full bg-transparent font-semibold text-gray-800 outline-none py-1 border-b border-indigo-200" 
                            placeholder="...">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-indigo-400 uppercase">Celular</label>
                        <input type="text" id="celular" readonly 
                            class="w-full bg-transparent font-semibold text-gray-800 outline-none py-1 border-b border-indigo-200" 
                            placeholder="...">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-3 uppercase tracking-wide">Seleccione el Turno</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="relative">
                        <input type="radio" name="turno" value="Mañana" class="peer hidden" checked>
                        <div class="cursor-pointer text-center p-3 rounded-xl border-2 border-gray-200 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 transition-all font-bold text-gray-500">
                            <i class="fas fa-sun mb-1 block"></i> MAÑANA
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="turno" value="Tarde" class="peer hidden">
                        <div class="cursor-pointer text-center p-3 rounded-xl border-2 border-gray-200 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 transition-all font-bold text-gray-500">
                            <i class="fas fa-moon mb-1 block"></i> TARDE
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" id="btnEnviar" 
                class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl transform hover:-translate-y-1 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-paper-plane"></i> CONFIRMAR MI CITA
            </button>
        </form>

        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-xs text-gray-400 font-medium italic">Sistema de Gestión de Citas v2.0</p>
        </div>
    </div>

    <script>
        // URLs CONFIGURADAS
        const URL_ORIGEN = "https://script.google.com/macros/s/AKfycbzdHC87qNYw0h0Fa6nIu05T8wjXCv20i-PZ1IKEYjdNMxnX8IOZnTGoCAkh9Pnux4gPxw/exec";
        const URL_DESTINO = "https://script.google.com/macros/s/AKfycbzMi99uWz8lNU2sAAet5McH3soVlDePdc2Rhgs13VgY4e1rP4ddCrKmvELeHgmEcbeLNQ/exec";

        // 1. FUNCIÓN PARA CONSULTAR DATOS (BÚSQUEDA)
        async function consultarDNI() {
            const dni = document.getElementById('dni').value;
            if (dni.length < 8) {
                return Swal.fire('Atención', 'Por favor, ingrese un DNI válido.', 'warning');
            }

            Swal.fire({
                title: 'Buscando datos...',
                text: 'Por favor espere',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                // Se agrega el parámetro ?dni= al script de origen
                const response = await fetch(`${URL_ORIGEN}?dni=${dni}`);
                const data = await response.json();

                if (data.found || data.nombre) {
                    document.getElementById('nombre').value = data.nombre || data.Nombre;
                    document.getElementById('estadoCivil').value = data.estadoCivil || data.EstadoCivil;
                    document.getElementById('celular').value = data.celular || data.Celular;
                    Swal.fire('¡Éxito!', 'Datos encontrados', 'success');
                } else {
                    Swal.fire('No encontrado', 'El DNI no existe en el registro principal.', 'info');
                }
            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'Hubo un problema al conectar con la base de datos.', 'error');
            }
        }

        // 2. FUNCIÓN PARA ENVIAR/REGISTRAR CITA
        document.getElementById('appointmentForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const nombreMadre = document.getElementById('nombre').value;
            if (!nombreMadre || nombreMadre === "Esperando consulta...") {
                return Swal.fire('Error', 'Debe consultar un DNI primero', 'error');
            }

            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> REGISTRANDO...';

            const payload = {
                dni: document.getElementById('dni').value,
                nombre: document.getElementById('nombre').value,
                estadoCivil: document.getElementById('estadoCivil').value,
                celular: document.getElementById('celular').value,
                turno: document.querySelector('input[name="turno"]:checked').value
            };

            try {
                // Envío mediante POST a la URL de Destino
                await fetch(URL_DESTINO, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                Swal.fire({
                    icon: 'success',
                    title: '¡Cita Registrada!',
                    text: 'Se ha guardado su información correctamente.',
                    confirmButtonColor: '#4F46E5'
                });
                
                document.getElementById('appointmentForm').reset();
                document.getElementById('nombre').value = "";
                document.getElementById('estadoCivil').value = "";
                document.getElementById('celular').value = "";

            } catch (error) {
                Swal.fire('Error', 'No se pudo guardar la cita. Intente de nuevo.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> CONFIRMAR MI CITA';
            }
        };
    </script>
</body>
</html>
